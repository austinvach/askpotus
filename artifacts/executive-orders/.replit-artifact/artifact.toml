kind = "web"
previewPath = "/"
title = "Presidential Executive Orders"
version = "1.0.0"
id = "artifacts/executive-orders"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22571
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/executive-orders run dev"

[services.env]
PORT = "22571"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/executive-orders", "run", "build"]
publicDir = "artifacts/executive-orders/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
