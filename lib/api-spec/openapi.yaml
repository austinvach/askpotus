openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: executive-orders
    description: Presidential Executive Order generation
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /executive-orders/invoice:
    post:
      operationId: createInvoice
      tags: [executive-orders]
      summary: Create a Lightning invoice for the filing fee
      description: Creates a 10-sat Lightning invoice from the destination address
      responses:
        "200":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateInvoiceResponse"
  /executive-orders/generate:
    post:
      operationId: generateExecutiveOrder
      tags: [executive-orders]
      summary: Generate a presidential executive order
      description: Generates a mock executive order in the style of the chosen president
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOrderRequest"
      responses:
        "200":
          description: Generated executive order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOrderResponse"
  /executive-orders/{id}:
    get:
      operationId: getExecutiveOrder
      tags: [executive-orders]
      summary: Get a previously generated executive order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Executive order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOrderResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    CreateInvoiceResponse:
      type: object
      properties:
        invoice:
          type: string
          description: The bolt11 Lightning invoice string
        paymentHash:
          type: string
          description: The payment hash (hex) used to verify payment
      required:
        - invoice
        - paymentHash
    GenerateOrderRequest:
      type: object
      properties:
        president:
          type: string
          enum: [george_w_bush, obama, trump, biden]
          description: The president to impersonate
        dilemma:
          type: string
          description: The decision or dilemma the user needs help with
        preimage:
          type: string
          description: The payment preimage proving the Lightning invoice was paid
      required:
        - president
        - dilemma
        - preimage
    GenerateOrderResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique ID for the order (used for permalink)
        orderNumber:
          type: string
          description: A fake executive order number
        title:
          type: string
          description: The title of the executive order
        body:
          type: string
          description: The full text of the executive order
        president:
          type: string
          description: The president who issued the order
        presidentKey:
          type: string
          description: The president enum key
        dilemma:
          type: string
          description: The original dilemma submitted
        date:
          type: string
          description: The date of the order
      required:
        - id
        - orderNumber
        - title
        - body
        - president
        - presidentKey
        - dilemma
        - date
